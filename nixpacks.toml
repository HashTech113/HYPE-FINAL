# NIXPACKS_PATH must be defined here because our custom [phases.setup] below
# overrides the provider's default setup, which would normally set this var.
# Recent BuildKit versions promoted the "undefined ARG referenced" warning to
# a hard error: the Nixpacks-generated Dockerfile contains
# ``ENV PATH=$NIXPACKS_PATH:$PATH`` (around line 18), and without this stanza
# Railway's build aborts with ``UndefinedVar: Usage of undefined variable
# '$NIXPACKS_PATH'``. The path below is where Nixpacks installs nixPkgs into
# the build container, so python312/gcc resolve normally during install.
[variables]
NIXPACKS_PATH = "/root/.nix-profile/bin"

[phases.setup]
nixPkgs = ["python312", "gcc"]
aptPkgs = ["libgl1", "libglib2.0-0"]

[phases.install]
cmds = [
  "python -m venv --copies /opt/venv",
  "/opt/venv/bin/pip install --upgrade pip setuptools wheel",
  "/opt/venv/bin/pip install --no-cache-dir -r backend/requirements.txt"
]

[start]
cmd = "cd backend && /opt/venv/bin/python -m uvicorn app.main:app --host 0.0.0.0 --port $PORT"
