# Backend tooling config. Tests run via `pytest.ini`; runtime deps
# stay in `requirements.txt` — this file is exclusively for static
# analysis (ruff, pyright). NO build metadata here on purpose: the
# project is deployed via Dockerfile + uvicorn, not as a pip package.
#
# Why ruff for both lint AND format:
#   - One tool. One config. Same speed (rust-native).
#   - Deterministic output — drop-in for black + isort.
#   - Subset of flake8/pylint rules curated to catch real bugs (B,
#     SIM, PERF) without the bikeshedding noise of stylistic checks
#     reasonable engineers disagree on.

[tool.ruff]
line-length = 100
target-version = "py311"

# Exclude generated and third-party content.
extend-exclude = [
    "migrations/versions/*.py",  # alembic boilerplate; keep formatting predictable
    "storage",
    "logs",
    ".venv",
]

[tool.ruff.lint]
# Curated set:
#   E,W   — basic style errors (pycodestyle)
#   F     — undefined names, unused imports (pyflakes)
#   I     — import order (drop-in for isort)
#   B     — bugbear: real-bug catches (mutable defaults, unused loop vars)
#   SIM   — simplifications (e.g. `if x: return True else: return False`)
#   UP    — modern Python idioms (3.10+ syntax, walrus, etc.)
#   PERF  — perf gotchas (e.g. list-comp inside try)
#   PIE   — assorted small wins
#   RUF   — ruff-specific corrections
select = ["E", "W", "F", "I", "B", "SIM", "UP", "PERF", "PIE", "RUF"]

# Suppressed:
#   E501  — line too long. We have 100-char lines but allow longer in
#           docstrings/URLs; ruff-format already handles wrapping for
#           actual code, this just stops noise.
#   B008  — function call in default arg. FastAPI's `Depends(...)`
#           intentionally uses this pattern; flagging it everywhere
#           would force a verbose dance.
#   SIM105 — suppressible-exception (`try/except/pass`). We use this
#           intentionally for best-effort cleanup paths (e.g. removing
#           a temp file that may not exist); rewriting them with
#           contextlib.suppress trades clarity for nothing.
#   SIM108 — ternary preferred. Often less readable than if/else.
#   UP007 — `X | Y` over `Optional[X]`. We use both depending on
#           context; not worth a forced rewrite right now.
#   UP042 — `StrEnum` over `str, Enum`. Cosmetic; revisit when we
#           drop Python 3.10 support (StrEnum is 3.11+).
#   RUF002, RUF003 — ambiguous unicode (em-dash etc.) in docstrings
#           and comments. We use proper typography intentionally;
#           the rule is for source-code STRINGS that look like ASCII
#           but aren't, which is genuinely confusing — those would
#           fire under RUF001 (which we keep enabled).
#   E402  — module-import-not-at-top-of-file. We have a few
#           intentional late imports (conftest sets env BEFORE
#           imports; main.py late-imports metrics to avoid an
#           import cycle).
ignore = ["E501", "B008", "SIM105", "SIM108", "UP007", "UP042", "RUF002", "RUF003", "E402"]

[tool.ruff.lint.per-file-ignores]
# Test files commonly import test-only fixtures and use non-PEP8
# patterns intentionally.
"tests/**/*.py" = ["F401", "F811", "B011"]
# `app/__init__.py` and similar entrypoints often import-for-side-effect.
"**/__init__.py" = ["F401"]

[tool.ruff.format]
# Drop-in for black. Sane defaults; no trailing-comma religion.
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false

[tool.ruff.lint.isort]
known-first-party = ["app", "tests"]
combine-as-imports = true
