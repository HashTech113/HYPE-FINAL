[pytest]
# Discovery: only `tests/` and only test_*.py files. Keeps pytest from
# accidentally importing app modules in collection-time error paths.
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Verbose-ish default: short traceback, dotted progress, durations of
# the 10 slowest tests so it's easy to spot regressions in the suite
# itself.
addopts =
    --strict-markers
    --strict-config
    --tb=short
    --durations=10

# Sane markers — fail fast if a test uses an undeclared one.
markers =
    unit: pure-Python tests, no I/O, no DB, no network
    integration: tests that spin up FastAPI / hit the DB / etc.
    slow: tests over ~1s (excluded from the default fast loop)

# pytest-asyncio configuration: opt-in (only tests with the
# @pytest.mark.asyncio marker get an event loop). Avoids accidentally
# running sync tests through the async runner.
asyncio_mode = strict

# Hides PendingDeprecationWarning noise from third-party deps without
# hiding our OWN deprecation warnings (which would mask real bugs).
filterwarnings =
    error::DeprecationWarning:app
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
